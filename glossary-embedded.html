<style>
:root {
  --bg: #f4ede0;
  --card: #fffdf8;
  --ink: #1a1a1a;
  --ink-light: #6b6b6b;
  --ink-faint: #a8a39a;
  --accent: #b94a3c;
  --accent-soft: #e8d5d0;
  --line: #d4cfc0;
  --line-light: #e7e2d4;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  margin: 0; padding: 0; height: 100%; overflow: hidden;
  background: var(--bg); color: var(--ink);
  font-family: 'Noto Sans JP', sans-serif;
  font-feature-settings: "palt";
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

body::before {
  content: ''; position: fixed; inset: 0;
  background-image: 
    radial-gradient(circle at 20% 30%, rgba(185, 74, 60, 0.03) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(26, 26, 26, 0.02) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}

#app {
  height: 100vh; height: 100dvh;
  display: flex; flex-direction: column;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  position: relative; z-index: 1;
}

/* ===== Header ===== */
header {
  display: flex; align-items: center;
  padding: 8px 12px;
  flex-shrink: 0;
  height: 52px;
}

.icon-btn {
  background: none; border: none;
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--ink-light);
  border-radius: 50%; transition: background 0.2s;
  padding: 0;
}
.icon-btn:active { background: rgba(0,0,0,0.06); }
.icon-btn svg { width: 20px; height: 20px; }

.counter-wrap {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  font-family: 'IBM Plex Mono', monospace;
}
.counter {
  font-size: 13px; color: var(--ink-light); letter-spacing: 0.08em;
}
.counter .current { color: var(--ink); font-weight: 500; }
.counter-label {
  font-size: 9px; color: var(--ink-faint);
  letter-spacing: 0.25em; text-transform: uppercase;
  margin-top: 1px;
}

/* ===== Card area ===== */
.card-area {
  flex: 1;
  position: relative;
  overflow: hidden;
  touch-action: pan-y;
}

.card {
  position: absolute;
  top: 0; bottom: 12px;
  left: 14px; right: 14px;
  background: var(--card);
  border-radius: 6px;
  box-shadow: 
    0 1px 2px rgba(0,0,0,0.04),
    0 12px 28px rgba(60, 50, 30, 0.08);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  will-change: transform;
  transform: translateX(0);
}

.card.no-anim { transition: none !important; }
.card.anim { transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1); }

.card-inner { padding: 28px 26px 60px; position: relative; }

.bookmark-btn {
  position: absolute;
  top: 22px; right: 18px;
  background: none; border: none;
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--ink-faint);
  padding: 0; z-index: 2;
}
.bookmark-btn svg { width: 18px; height: 18px; }
.bookmark-btn.active { color: var(--accent); }
.bookmark-btn.active svg { fill: var(--accent); }

.term-mark {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; letter-spacing: 0.25em;
  color: var(--accent); text-transform: uppercase;
  margin-bottom: 8px;
}

.term {
  font-family: 'Shippori Mincho B1', serif;
  font-weight: 700;
  font-size: 30px;
  line-height: 1.25;
  letter-spacing: -0.005em;
  margin: 0 40px 0 0;
  color: var(--ink);
  word-break: break-word;
}

.term-summary {
  margin-top: 14px;
  font-size: 14px; line-height: 1.7;
  color: var(--ink-light);
  font-weight: 400;
}

.divider {
  display: flex; align-items: center;
  margin: 28px 0 24px;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px; background: var(--line);
}
.divider-mark {
  margin: 0 14px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px; color: var(--accent);
  letter-spacing: 0.3em;
}

.field { margin-bottom: 22px; }

.field-label {
  display: flex; align-items: baseline; gap: 10px;
  margin-bottom: 8px;
}
.field-label-jp {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 13px; font-weight: 500;
  color: var(--ink);
  letter-spacing: 0.05em;
}
.field-label-en {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px; letter-spacing: 0.2em;
  color: var(--accent); text-transform: uppercase;
}

.field-value {
  font-size: 14.5px; line-height: 1.8;
  color: var(--ink);
}

.field-value.detail {
  font-size: 14px; line-height: 1.9;
}

/* Importance scale */
.importance-row {
  display: flex; align-items: center; gap: 6px;
}
.importance-dot {
  width: 11px; height: 11px;
  border-radius: 50%;
  border: 1px solid var(--accent);
  background: transparent;
}
.importance-dot.filled { background: var(--accent); }
.importance-num {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px; color: var(--ink-light);
  margin-left: 10px; font-weight: 500;
}

/* Related pills */
.related-list { display: flex; flex-wrap: wrap; gap: 6px; }
.related-pill {
  padding: 7px 13px;
  border: 1px solid var(--line);
  border-radius: 100px;
  font-size: 12.5px;
  color: var(--ink-light);
  background: transparent;
  cursor: default;
  font-family: inherit;
  transition: all 0.18s;
}
.related-pill.linked {
  border-color: var(--accent);
  color: var(--accent);
  cursor: pointer;
}
.related-pill.linked:active {
  background: var(--accent);
  color: var(--card);
}

/* ===== Pager ===== */
.pager-bar {
  flex-shrink: 0;
  height: 28px;
  display: flex; align-items: center; justify-content: center;
}
.pager-track {
  width: 60%;
  max-width: 200px;
  height: 2px;
  background: var(--line-light);
  border-radius: 1px;
  position: relative;
  overflow: hidden;
}
.pager-fill {
  position: absolute;
  top: 0; left: 0; height: 100%;
  background: var(--accent);
  transition: width 0.3s ease;
  border-radius: 1px;
}

/* ===== Empty state ===== */
.empty-state {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 32px;
  text-align: center;
}
.empty-mark {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; letter-spacing: 0.4em;
  color: var(--accent); text-transform: uppercase;
  margin-bottom: 20px;
}
.empty-state h1 {
  font-family: 'Shippori Mincho B1', serif;
  font-weight: 800;
  font-size: 44px;
  margin: 0 0 4px;
  letter-spacing: -0.01em;
  line-height: 1.1;
}
.empty-state .h-sub {
  font-family: 'Shippori Mincho B1', serif;
  font-weight: 500;
  font-size: 16px;
  color: var(--ink-light);
  margin-bottom: 36px;
}
.divider-em {
  width: 60px; height: 1px;
  background: var(--accent);
  margin: 0 auto 36px;
}
.empty-state .desc {
  color: var(--ink-light);
  font-size: 13.5px; line-height: 1.85;
  margin-bottom: 36px;
  max-width: 320px;
}
.upload-btn {
  display: inline-block;
  padding: 14px 36px;
  background: var(--ink);
  color: var(--bg);
  border: none;
  border-radius: 100px;
  font-family: inherit;
  font-size: 13.5px;
  font-weight: 500;
  cursor: pointer;
  letter-spacing: 0.05em;
}
.upload-btn:active { transform: scale(0.97); }
.empty-hint {
  margin-top: 18px;
  font-size: 11px;
  color: var(--ink-faint);
  font-family: 'IBM Plex Mono', monospace;
  letter-spacing: 0.05em;
}

input[type="file"] { display: none; }

/* ===== Panel (search & filter) ===== */
.panel {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 100;
  display: flex; flex-direction: column;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
  visibility: hidden;
}
.panel.open { transform: translateY(0); visibility: visible; }

.panel-header {
  display: flex; align-items: center;
  padding: 8px 12px;
  height: 52px;
  border-bottom: 1px solid var(--line-light);
}
.panel-title {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 17px; font-weight: 500;
  flex: 1; text-align: center;
  letter-spacing: 0.02em;
}

.search-input-wrap { padding: 16px 20px 8px; }
.search-input {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid var(--line);
  border-radius: 6px;
  font-family: inherit;
  font-size: 15px;
  background: var(--card);
  color: var(--ink);
}
.search-input:focus {
  outline: none; border-color: var(--accent);
}

.results-list { flex: 1; overflow-y: auto; padding: 0 20px 20px; }
.result-item {
  padding: 14px 0;
  border-bottom: 1px solid var(--line-light);
  cursor: pointer;
  display: flex; gap: 12px; align-items: flex-start;
}
.result-item:active { opacity: 0.5; }
.result-num {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; color: var(--ink-faint);
  margin-top: 4px;
  letter-spacing: 0.05em;
  flex-shrink: 0;
  width: 32px;
}
.result-content { flex: 1; min-width: 0; }
.result-term {
  font-family: 'Shippori Mincho B1', serif;
  font-weight: 500;
  font-size: 16px;
  margin-bottom: 2px;
}
.result-desc {
  font-size: 12px;
  color: var(--ink-light);
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 1;
  -webkit-box-orient: vertical;
}
.result-empty {
  padding: 60px 20px;
  text-align: center;
  color: var(--ink-faint);
  font-size: 13px;
}

/* Filter sections */
.filter-section { padding: 18px 20px; border-bottom: 1px solid var(--line-light); }
.filter-section-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; letter-spacing: 0.2em;
  color: var(--accent); margin-bottom: 12px;
  text-transform: uppercase; font-weight: 500;
}
.filter-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.filter-chip {
  padding: 7px 14px;
  border: 1px solid var(--line);
  border-radius: 100px;
  background: transparent;
  font-family: inherit;
  font-size: 13px;
  color: var(--ink-light);
  cursor: pointer;
}
.filter-chip.active {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
}
.filter-chip.accent.active {
  background: var(--accent);
  border-color: var(--accent);
}

.filter-summary {
  padding: 16px 20px;
  font-size: 12px; color: var(--ink-light);
  font-family: 'IBM Plex Mono', monospace;
  text-align: center;
}

.reset-btn {
  display: block;
  margin: 0 20px;
  padding: 12px;
  background: transparent;
  border: 1px solid var(--line);
  border-radius: 6px;
  color: var(--ink-light);
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
  width: calc(100% - 40px);
}

/* No-data state inside card area */
.no-results-card {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--ink-faint);
  font-size: 13px;
  text-align: center;
  padding: 20px;
}
.no-results-card .em {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 18px;
  color: var(--ink-light);
  margin-bottom: 8px;
}

/* ===== Hide while empty ===== */
.hide { display: none !important; }
</style>

<script>
// ============================================================
// State
// ============================================================
const STORAGE_KEY = 'glossary-data-v1';
const BOOKMARK_KEY = 'glossary-bookmarks-v1';
const FILTER_KEY = 'glossary-filters-v1';

let allRows = [];
let columns = [];
let titleColumn = '';
let visibleRows = [];
let currentIndex = 0;
let bookmarks = new Set();
let filters = {
  mode: 'all',          // all | bookmark | shuffle
  category: 'all',
  minImportance: 0
};

// Detect column types
let summaryCol = null;   // 一言説明
let categoryCol = null;  // 分野
let detailCol = null;    // 詳細説明
let importanceCol = null;// 重要度
let relatedCol = null;   // 関連語

// ============================================================
// Storage
// ============================================================
function loadFromStorage() {
  try {
    const data = localStorage.getItem(STORAGE_KEY);
    if (data) {
      const parsed = JSON.parse(data);
      allRows = parsed.rows || [];
      columns = parsed.columns || [];
      titleColumn = parsed.titleColumn || (columns[0] || '');
      detectColumns();
    }
    const bm = localStorage.getItem(BOOKMARK_KEY);
    if (bm) bookmarks = new Set(JSON.parse(bm));
    const f = localStorage.getItem(FILTER_KEY);
    if (f) filters = { ...filters, ...JSON.parse(f) };
  } catch(e) { console.warn(e); }
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ rows: allRows, columns, titleColumn }));
}
function saveBookmarks() {
  localStorage.setItem(BOOKMARK_KEY, JSON.stringify([...bookmarks]));
}
function saveFilters() {
  localStorage.setItem(FILTER_KEY, JSON.stringify(filters));
}

// ============================================================
// Column detection (handles Notion CSV)
// ============================================================
function detectColumns() {
  const colNames = columns.map(c => c.toLowerCase());
  const findCol = (patterns) => {
    for (const p of patterns) {
      const idx = columns.findIndex(c => c.includes(p));
      if (idx >= 0) return columns[idx];
    }
    return null;
  };
  summaryCol    = findCol(['一言', 'サマリー', 'summary', '概要']);
  categoryCol   = findCol(['分野', 'カテゴリ', 'category', 'ジャンル']);
  detailCol     = findCol(['詳細', '説明', 'description', 'detail']);
  importanceCol = findCol(['重要', 'importance', 'priority', '優先']);
  relatedCol    = findCol(['関連', 'related', 'tags', 'タグ']);
  // Avoid summary being same as detail
  if (summaryCol && detailCol && summaryCol === detailCol) {
    summaryCol = null;
  }
}

// ============================================================
// CSV upload
// ============================================================
document.getElementById('csv-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  Papa.parse(file, {
    header: true,
    skipEmptyLines: true,
    transformHeader: h => h.trim(),
    complete: (results) => {
      if (!results.data.length) {
        alert('CSVが空のようです');
        return;
      }
      allRows = results.data.filter(r => Object.values(r).some(v => v && v.trim()));
      columns = results.meta.fields || Object.keys(allRows[0]);
      titleColumn = columns[0];
      detectColumns();
      saveData();
      currentIndex = 0;
      filters = { mode: 'all', category: 'all', minImportance: 0 };
      saveFilters();
      applyFilters();
      enterMainView();
    },
    error: (err) => alert('CSVの読み込みに失敗しました: ' + err.message)
  });
});

// ============================================================
// Filtering
// ============================================================
function applyFilters() {
  let rows = [...allRows];
  if (filters.mode === 'bookmark') {
    rows = rows.filter(r => bookmarks.has(r[titleColumn]));
  }
  if (filters.category !== 'all' && categoryCol) {
    rows = rows.filter(r => (r[categoryCol] || '') === filters.category);
  }
  if (filters.minImportance > 0 && importanceCol) {
    rows = rows.filter(r => {
      const v = parseInt(r[importanceCol], 10);
      return !isNaN(v) && v >= filters.minImportance;
    });
  }
  if (filters.mode === 'shuffle') {
    for (let i = rows.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [rows[i], rows[j]] = [rows[j], rows[i]];
    }
  }
  visibleRows = rows;
  if (currentIndex >= visibleRows.length) currentIndex = 0;
  renderCurrent();
  updateFilterSummary();
  updateModeLabel();
}

function updateModeLabel() {
  const label = document.getElementById('mode-label');
  let txt = 'All';
  if (filters.mode === 'bookmark') txt = 'Bookmarked';
  else if (filters.mode === 'shuffle') txt = 'Shuffled';
  if (filters.minImportance > 0) txt += ' · ★' + filters.minImportance + '+';
  if (filters.category !== 'all') txt += ' · ' + filters.category;
  label.textContent = txt;
}

function updateFilterSummary() {
  document.getElementById('filter-summary').textContent = visibleRows.length + ' 件 表示';
}

// ============================================================
// Render card
// ============================================================
const cardArea = document.getElementById('card-area');

function renderCurrent(enterFrom) {
  // remove old card if any
  document.querySelectorAll('.card, .no-results-card').forEach(el => el.remove());

  if (visibleRows.length === 0) {
    const div = document.createElement('div');
    div.className = 'no-results-card';
    div.innerHTML = '<div class="em">該当なし</div><div>条件を変えて再度お試しください</div>';
    cardArea.appendChild(div);
    document.getElementById('cur-num').textContent = '0';
    document.getElementById('total-num').textContent = '0';
    document.getElementById('pager-fill').style.width = '0%';
    return;
  }

  const card = buildCard(visibleRows[currentIndex]);
  // Pre-position the new card off-screen if entering from a side
  if (enterFrom === 'right') {
    card.classList.add('no-anim');
    card.style.transform = 'translateX(' + window.innerWidth + 'px)';
  } else if (enterFrom === 'left') {
    card.classList.add('no-anim');
    card.style.transform = 'translateX(-' + window.innerWidth + 'px)';
  }
  cardArea.appendChild(card);
  attachSwipe(card);

  if (enterFrom) {
    // Force reflow, then animate in
    void card.offsetHeight;
    requestAnimationFrame(() => {
      card.classList.remove('no-anim');
      card.classList.add('anim');
      card.style.transform = 'translateX(0)';
    });
  }

  document.getElementById('cur-num').textContent = currentIndex + 1;
  document.getElementById('total-num').textContent = visibleRows.length;
  document.getElementById('pager-fill').style.width = ((currentIndex + 1) / visibleRows.length * 100) + '%';
}

function buildCard(row) {
  const card = document.createElement('div');
  card.className = 'card';

  const inner = document.createElement('div');
  inner.className = 'card-inner';

  // Bookmark
  const bmBtn = document.createElement('button');
  bmBtn.className = 'bookmark-btn' + (bookmarks.has(row[titleColumn]) ? ' active' : '');
  bmBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>';
  bmBtn.onclick = (e) => {
    e.stopPropagation();
    const t = row[titleColumn];
    if (bookmarks.has(t)) bookmarks.delete(t); else bookmarks.add(t);
    saveBookmarks();
    bmBtn.classList.toggle('active');
  };
  inner.appendChild(bmBtn);

  // Mark
  const mark = document.createElement('div');
  mark.className = 'term-mark';
  mark.textContent = String(currentIndex + 1).padStart(3, '0') + ' / ' + String(visibleRows.length).padStart(3, '0');
  inner.appendChild(mark);

  // Term
  const term = document.createElement('h1');
  term.className = 'term';
  term.textContent = row[titleColumn] || '(無題)';
  inner.appendChild(term);

  // Summary
  if (summaryCol && row[summaryCol]) {
    const s = document.createElement('div');
    s.className = 'term-summary';
    s.textContent = row[summaryCol];
    inner.appendChild(s);
  }

  // Divider
  const div = document.createElement('div');
  div.className = 'divider';
  div.innerHTML = '<span class="divider-mark">◇ ◆ ◇</span>';
  inner.appendChild(div);

  // Display fields in this preferred order
  const skipCols = new Set([titleColumn, summaryCol].filter(Boolean));
  const ordered = [];
  if (categoryCol)   ordered.push(categoryCol);
  if (importanceCol) ordered.push(importanceCol);
  if (detailCol)     ordered.push(detailCol);
  if (relatedCol)    ordered.push(relatedCol);
  for (const c of columns) {
    if (!skipCols.has(c) && !ordered.includes(c)) ordered.push(c);
  }

  for (const col of ordered) {
    const value = row[col];
    if (value === undefined || value === null || String(value).trim() === '') continue;
    inner.appendChild(buildField(col, value));
  }

  card.appendChild(inner);
  return card;
}

function buildField(col, value) {
  const wrap = document.createElement('div');
  wrap.className = 'field';

  const label = document.createElement('div');
  label.className = 'field-label';
  const lblJp = document.createElement('span');
  lblJp.className = 'field-label-jp';
  lblJp.textContent = col;
  label.appendChild(lblJp);
  const lblEn = document.createElement('span');
  lblEn.className = 'field-label-en';
  lblEn.textContent = labelEn(col);
  label.appendChild(lblEn);
  wrap.appendChild(label);

  const val = document.createElement('div');
  val.className = 'field-value';

  if (col === importanceCol) {
    const num = parseInt(value, 10);
    if (!isNaN(num)) {
      const row = document.createElement('div');
      row.className = 'importance-row';
      const max = num > 5 ? num : 5;
      for (let i = 1; i <= max; i++) {
        const dot = document.createElement('div');
        dot.className = 'importance-dot' + (i <= num ? ' filled' : '');
        row.appendChild(dot);
      }
      const n = document.createElement('span');
      n.className = 'importance-num';
      n.textContent = num + ' / ' + max;
      row.appendChild(n);
      val.appendChild(row);
    } else {
      val.textContent = value;
    }
  } else if (col === relatedCol) {
    const list = document.createElement('div');
    list.className = 'related-list';
    const terms = String(value).split(/[;；,，、]/).map(s => s.trim()).filter(Boolean);
    const allTitles = new Set(allRows.map(r => r[titleColumn]));
    for (const t of terms) {
      const pill = document.createElement('button');
      pill.className = 'related-pill';
      pill.textContent = t;
      if (allTitles.has(t)) {
        pill.classList.add('linked');
        pill.onclick = () => jumpToTerm(t);
      }
      list.appendChild(pill);
    }
    val.appendChild(list);
  } else if (col === detailCol) {
    val.classList.add('detail');
    val.textContent = value;
  } else {
    val.textContent = value;
  }
  wrap.appendChild(val);
  return wrap;
}

function labelEn(col) {
  const map = {
    [titleColumn]: 'Term',
    [summaryCol]: 'Summary',
    [categoryCol]: 'Field',
    [detailCol]: 'Description',
    [importanceCol]: 'Priority',
    [relatedCol]: 'Related'
  };
  return map[col] || '';
}

function jumpToTerm(term) {
  // Switch to "all" mode to ensure visibility
  if (filters.mode === 'bookmark' && !bookmarks.has(term)) {
    filters.mode = 'all';
    saveFilters();
    applyFilters();
  }
  const idx = visibleRows.findIndex(r => r[titleColumn] === term);
  if (idx >= 0) {
    currentIndex = idx;
    renderCurrent();
  } else {
    // not in current filter; switch to all
    filters.mode = 'all';
    filters.category = 'all';
    filters.minImportance = 0;
    saveFilters();
    applyFilters();
    const newIdx = visibleRows.findIndex(r => r[titleColumn] === term);
    if (newIdx >= 0) {
      currentIndex = newIdx;
      renderCurrent();
    }
  }
}

// ============================================================
// Swipe
// ============================================================
function attachSwipe(card) {
  let startX = 0, startY = 0, dx = 0, dy = 0;
  let dragging = false, decided = false, isHorizontal = false;
  const threshold = 60;
  const width = window.innerWidth;

  card.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    dx = 0; dy = 0;
    dragging = true; decided = false; isHorizontal = false;
    card.classList.add('no-anim');
    card.classList.remove('anim');
  }, { passive: true });

  card.addEventListener('touchmove', (e) => {
    if (!dragging) return;
    dx = e.touches[0].clientX - startX;
    dy = e.touches[0].clientY - startY;
    if (!decided) {
      if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
        isHorizontal = Math.abs(dx) > Math.abs(dy);
        decided = true;
      }
    }
    if (isHorizontal) {
      e.preventDefault();
      card.style.transform = 'translateX(' + dx + 'px)';
    }
  }, { passive: false });

  card.addEventListener('touchend', () => {
    if (!dragging) return;
    dragging = false;
    if (!isHorizontal) {
      card.style.transform = '';
      return;
    }
    const atStart = currentIndex === 0;
    const atEnd = currentIndex === visibleRows.length - 1;
    card.classList.remove('no-anim');
    card.classList.add('anim');
    if (dx < -threshold && !atEnd) {
      card.style.transform = 'translateX(-' + width + 'px)';
      card.addEventListener('transitionend', () => {
        currentIndex++;
        renderCurrent('right');
      }, { once: true });
    } else if (dx > threshold && !atStart) {
      card.style.transform = 'translateX(' + width + 'px)';
      card.addEventListener('transitionend', () => {
        currentIndex--;
        renderCurrent('left');
      }, { once: true });
    } else {
      card.style.transform = 'translateX(0)';
    }
  });

  card.addEventListener('touchcancel', () => {
    dragging = false;
    card.classList.remove('no-anim');
    card.classList.add('anim');
    card.style.transform = '';
  });
}

// keyboard nav
document.addEventListener('keydown', (e) => {
  if (visibleRows.length === 0) return;
  if (document.querySelector('.panel.open')) return;
  if (e.key === 'ArrowRight' && currentIndex < visibleRows.length - 1) {
    currentIndex++; renderCurrent();
  } else if (e.key === 'ArrowLeft' && currentIndex > 0) {
    currentIndex--; renderCurrent();
  }
});

// ============================================================
// Panels
// ============================================================
function openPanel(id) {
  document.getElementById(id).classList.add('open');
  if (id === 'search-panel') {
    setTimeout(() => document.getElementById('search-input').focus(), 100);
    renderSearchResults('');
  }
  if (id === 'filter-panel') {
    renderFilterPanel();
  }
}
function closePanel(id) {
  document.getElementById(id).classList.remove('open');
}
document.getElementById('search-btn').onclick = () => openPanel('search-panel');
document.getElementById('filter-btn').onclick = () => openPanel('filter-panel');

// Search
document.getElementById('search-input').addEventListener('input', (e) => {
  renderSearchResults(e.target.value);
});

function renderSearchResults(q) {
  const list = document.getElementById('results-list');
  list.innerHTML = '';
  const query = q.trim().toLowerCase();
  let results = allRows;
  if (query) {
    results = allRows.filter(r => {
      return columns.some(c => (r[c] || '').toLowerCase().includes(query));
    });
  }
  if (results.length === 0) {
    list.innerHTML = '<div class="result-empty">該当なし</div>';
    return;
  }
  results.slice(0, 200).forEach((r, i) => {
    const item = document.createElement('div');
    item.className = 'result-item';
    const num = document.createElement('div');
    num.className = 'result-num';
    num.textContent = String(i + 1).padStart(3, '0');
    const content = document.createElement('div');
    content.className = 'result-content';
    const term = document.createElement('div');
    term.className = 'result-term';
    term.textContent = r[titleColumn] || '(無題)';
    const desc = document.createElement('div');
    desc.className = 'result-desc';
    desc.textContent = (summaryCol && r[summaryCol]) || (detailCol && r[detailCol]) || '';
    content.appendChild(term);
    content.appendChild(desc);
    item.appendChild(num);
    item.appendChild(content);
    item.onclick = () => {
      closePanel('search-panel');
      jumpToTerm(r[titleColumn]);
    };
    list.appendChild(item);
  });
}

// Filter panel
function renderFilterPanel() {
  // Mode chips
  document.querySelectorAll('#mode-chips .filter-chip').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === filters.mode);
    b.onclick = () => {
      filters.mode = b.dataset.mode;
      saveFilters();
      applyFilters();
      renderFilterPanel();
    };
  });
  // Category chips
  const catBox = document.getElementById('category-chips');
  catBox.innerHTML = '';
  if (categoryCol) {
    const cats = ['all', ...new Set(allRows.map(r => r[categoryCol]).filter(Boolean))];
    for (const c of cats) {
      const btn = document.createElement('button');
      btn.className = 'filter-chip' + (c === filters.category ? ' active' : '');
      btn.textContent = c === 'all' ? 'すべて' : c;
      btn.onclick = () => {
        filters.category = c;
        saveFilters();
        applyFilters();
        renderFilterPanel();
      };
      catBox.appendChild(btn);
    }
  } else {
    catBox.innerHTML = '<div style="color:var(--ink-faint); font-size:12px;">分野列が見つかりません</div>';
  }
  // Importance
  document.querySelectorAll('#importance-chips .filter-chip').forEach(b => {
    const v = b.dataset.imp === 'all' ? 0 : parseInt(b.dataset.imp, 10);
    b.classList.toggle('active', v === filters.minImportance);
    b.onclick = () => {
      filters.minImportance = v;
      saveFilters();
      applyFilters();
      renderFilterPanel();
    };
  });
}

function resetFilters() {
  filters = { mode: 'all', category: 'all', minImportance: 0 };
  currentIndex = 0;
  saveFilters();
  applyFilters();
  renderFilterPanel();
}

// ============================================================
// Init
// ============================================================
function enterMainView() {
  document.getElementById('empty-state').classList.add('hide');
  document.getElementById('main-header').classList.remove('hide');
  document.getElementById('pager-bar').classList.remove('hide');
}

function loadEmbeddedCSV() {
  const el = document.getElementById('embedded-csv');
  if (!el) return false;
  const text = el.textContent.trim();
  if (!text) return false;
  const results = Papa.parse(text, {
    header: true,
    skipEmptyLines: true,
    transformHeader: h => h.trim()
  });
  if (!results.data.length) return false;
  allRows = results.data.filter(r => Object.values(r).some(v => v && String(v).trim()));
  columns = results.meta.fields || Object.keys(allRows[0]);
  titleColumn = columns[0];
  detectColumns();
  saveData();
  return true;
}

function init() {
  loadFromStorage();
  if (allRows.length === 0) {
    // First visit: load embedded CSV automatically
    if (loadEmbeddedCSV()) {
      currentIndex = 0;
    }
  }
  if (allRows.length > 0) {
    enterMainView();
    applyFilters();
  }
}

init();
</script>
</body>
</html>
