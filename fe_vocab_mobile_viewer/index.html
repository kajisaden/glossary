<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FE用語ビューア</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <h1>FE用語ビューア</h1>
      <p id="status">CSVを読み込んでください</p>
    </div>
    <button id="fileButton" class="small-button">CSV選択</button>
    <input id="csvFile" type="file" accept=".csv,text/csv" hidden />
  </header>

  <main class="app">
    <section class="toolbar">
      <input id="searchInput" type="search" placeholder="用語・分野・説明を検索" />
      <select id="fieldFilter" aria-label="分野で絞り込み">
        <option value="">すべての分野</option>
      </select>
    </section>

    <section class="mode-tabs" aria-label="表示切替">
      <button id="cardModeBtn" class="active">カード</button>
      <button id="listModeBtn">一覧</button>
    </section>

    <section id="cardMode" class="card-mode">
      <article id="termCard" class="term-card">
        <p class="empty">CSVを選択すると、ここに用語カードが表示されます。</p>
      </article>

      <nav class="bottom-nav" aria-label="カード移動">
        <button id="prevBtn">前へ</button>
        <div id="counter">0 / 0</div>
        <button id="nextBtn">次へ</button>
      </nav>
    </section>

    <section id="listMode" class="list-mode hidden">
      <div id="termList" class="term-list"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
