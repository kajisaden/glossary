<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f1226">
<meta name="description" content="初心者向けの学習コンテンツ集。スマホで開いてそのまま使えます。">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Glossary">
<title>Glossary｜学習コンテンツ集</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    background: radial-gradient(1200px 600px at 50% -10%, #1b2350 0%, #0f1226 60%);
    color: #e8ecf8;
    line-height: 1.8;
    -webkit-font-smoothing: antialiased;
    -webkit-text-size-adjust: 100%;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    min-height: 100vh;
  }
  header { text-align: center; padding: 56px 20px 24px; }
  header h1 {
    font-size: clamp(1.8rem, 6vw, 2.8rem);
    margin: 0 0 10px;
    background: linear-gradient(90deg, #5b8cff, #4fd1c5);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  header p { color: #9aa3c7; max-width: 560px; margin: 0 auto; }
  main { max-width: 720px; margin: 0 auto; padding: 10px 16px 70px; }
  .card {
    display: block;
    text-decoration: none;
    color: inherit;
    background: #1a1f3a;
    border: 1px solid #303867;
    border-radius: 16px;
    padding: 22px 22px;
    margin: 16px 0;
    box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    transition: transform .1s, border-color .15s;
  }
  .card:hover, .card:active { transform: translateY(-2px); border-color: #5b8cff; }
  .card h2 { margin: 0 0 6px; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }
  .card p { margin: 0; color: #9aa3c7; font-size: .96rem; }
  .emoji { font-size: 1.5rem; }
  .tag {
    display: inline-block; margin-top: 12px; font-size: .8rem; color: #ffd166;
    border: 1px solid #303867; border-radius: 999px; padding: 3px 12px;
  }
  footer { text-align: center; color: #9aa3c7; padding: 10px 20px 50px; font-size: .85rem; }
  @media (max-width: 600px) {
    header { padding: 40px 16px 18px; }
    .card { padding: 18px 16px; }
  }
</style>
</head>
<body>
  <header>
    <h1>学習コンテンツ集</h1>
    <p>スマホでもそのまま使える、手を動かして学べるミニ教材。気になるものを開いてみてください。</p>
  </header>
  <main>
    <a class="card" href="perceptron/">
      <h2><span class="emoji">🧠</span>パーセプトロンを体験して学ぼう</h2>
      <p>AIの基本部品「パーセプトロン」を、スライダーや自動学習を触りながら直感的に理解する6ステップ。</p>
      <span class="tag">インタラクティブ ／ 初心者向け</span>
    </a>
    <a class="card" href="fe_vocab_mobile_viewer/">
      <h2><span class="emoji">📚</span>FE用語ビューア</h2>
      <p>CSVを読み込み、用語カードをスワイプで切り替えて閲覧できるスマホ向けビューア。</p>
      <span class="tag">単語帳 ／ CSV読み込み</span>
    </a>
  </main>
  <footer>📱 スマホはホーム画面に追加すると、アプリのように開けます。</footer>
</body>
</html>
